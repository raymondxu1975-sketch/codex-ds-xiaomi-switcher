server:
  host: 127.0.0.1
  port: 5055

providers:
  deepseek:
    label: DeepSeek
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
    models:
      - deepseek-v4-pro
    timeout: 180
    request_defaults:
      thinking:
        type: disabled
    stream_options:
      include_usage: true

  xiaomi:
    label: Xiaomi
    base_url: https://token-plan-sgp.xiaomimimo.com/v1
    api_key_env: XIAOMI_API_KEY
    models:
      - mimo-v2.5-pro
    timeout: 180